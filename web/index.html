<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>Zen Nonogram · 禅</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;500;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --moss: #668866;
  --paper: #ccccaa;
  --sage: #99aa99;
  --eucalyptus: #778877;
  --brown: #aa8877;
  --sand: #ccaa88;
  --ink: #2a3528;
  --ink-soft: rgba(42, 53, 40, 0.55);
  --ink-faint: rgba(42, 53, 40, 0.22);
  --paper-warm: #d4d2b1;
  --paper-deep: #b8b896;
  --paper-shadow: rgba(80, 70, 50, 0.18);
  --moss-deep: #4a6448;
  --gold: #a89760;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 17px;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  overscroll-behavior: none;
}

body {
  background-image:
    radial-gradient(circle at 12% 18%, rgba(102,136,102,0.07) 0%, transparent 55%),
    radial-gradient(circle at 88% 82%, rgba(119,136,119,0.09) 0%, transparent 55%),
    radial-gradient(circle at 50% 50%, rgba(168,151,96,0.04) 0%, transparent 70%);
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: 0.35;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.4 0 0 0 0 0.35 0 0 0 0 0.2 0 0 0 0.08 0'/></filter><rect width='120' height='120' filter='url(%23n)'/></svg>");
  mix-blend-mode: multiply;
}

#app {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  padding: 28px 24px max(80px, calc(60px + env(safe-area-inset-bottom)));
  max-width: 1200px;
  margin: 0 auto;
}

/* HEADER */

.brand {
  display: flex;
  align-items: baseline;
  gap: 18px;
  padding-bottom: 18px;
  margin-bottom: 36px;
  border-bottom: 1px solid var(--ink-faint);
  position: relative;
}

.brand::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  width: 60px;
  height: 1px;
  background: var(--moss);
}

.brand-mark {
  font-family: 'Shippori Mincho B1', serif;
  font-weight: 800;
  font-size: 42px;
  color: var(--moss-deep);
  line-height: 1;
  letter-spacing: -0.02em;
}

.brand-mark .kanji {
  font-size: 36px;
  color: var(--moss);
  margin-right: 6px;
  vertical-align: 2px;
}

.brand-tag {
  font-style: italic;
  color: var(--ink-soft);
  font-size: 16px;
  letter-spacing: 0.04em;
  margin-left: auto;
  white-space: nowrap;
}

@media (max-width: 600px) {
  .brand-mark { font-size: 32px; }
  .brand-mark .kanji { font-size: 28px; }
  .brand-tag { display: none; }
}

/* LIBRARY */

.section-head {
  display: flex;
  align-items: baseline;
  gap: 20px;
  margin-bottom: 22px;
  flex-wrap: wrap;
}

.section-title {
  font-family: 'Shippori Mincho B1', serif;
  font-weight: 500;
  font-size: 28px;
  color: var(--ink);
  letter-spacing: 0.01em;
}

.section-title .accent {
  color: var(--moss);
  font-weight: 700;
  margin-right: 8px;
}

.section-sub {
  font-style: italic;
  color: var(--ink-soft);
  font-size: 16px;
  margin-left: 8px;
}

.filter-tabs {
  display: flex;
  gap: 4px;
  margin-left: auto;
  background: rgba(119,136,119,0.15);
  padding: 4px;
  border-radius: 2px;
}

.filter-tab {
  background: transparent;
  border: none;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-soft);
  padding: 10px 16px;
  cursor: pointer;
  transition: all 0.25s;
  border-radius: 1px;
  min-height: 44px;
}

.filter-tab:hover { color: var(--ink); }

.filter-tab.active {
  background: var(--paper);
  color: var(--moss-deep);
  box-shadow: 0 1px 3px var(--paper-shadow);
}

.level-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 20px;
}

.level-card {
  background: var(--paper-warm);
  border: 1px solid var(--ink-faint);
  border-radius: 2px;
  padding: 18px 18px 16px;
  cursor: pointer;
  transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1),
              box-shadow 0.3s,
              border-color 0.3s;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-height: 220px;
}

.level-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 20px var(--paper-shadow);
  border-color: var(--moss);
}

.level-card.solved::before {
  content: '✓';
  position: absolute;
  top: 12px;
  right: 14px;
  color: var(--moss);
  font-weight: 700;
  font-size: 18px;
  line-height: 1;
}

.level-card.compound {
  border-color: var(--gold);
  background: linear-gradient(160deg, var(--paper-warm) 0%, #d6d4b8 100%);
}

.level-card.compound::before {
  content: '✴';
}

.level-card.compound.all-done::before {
  content: '✦';
  color: var(--gold);
  font-size: 20px;
}

.preview {
  background: var(--paper);
  padding: 14px;
  border-radius: 1px;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 110px;
  box-shadow: inset 0 1px 3px rgba(80,70,50,0.1);
}

.preview svg { display: block; max-width: 100%; height: auto; }

.level-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 8px;
}

.level-name {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 18px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.2;
}

.level-size {
  font-size: 13px;
  color: var(--ink-soft);
  font-style: italic;
  white-space: nowrap;
}

.level-badge {
  position: absolute;
  top: 12px;
  left: 14px;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 600;
}

.level-card .delete-btn {
  position: absolute;
  bottom: 10px;
  right: 12px;
  background: transparent;
  border: none;
  font-family: inherit;
  font-size: 12px;
  color: var(--ink-soft);
  cursor: pointer;
  letter-spacing: 0.05em;
  opacity: 0;
  transition: opacity 0.2s, color 0.2s;
  padding: 8px;
  min-height: 44px;
}

.level-card .edit-btn {
  position: absolute;
  bottom: 10px;
  right: 56px;
  background: transparent;
  border: none;
  font-family: inherit;
  font-size: 12px;
  color: var(--ink-soft);
  cursor: pointer;
  letter-spacing: 0.05em;
  opacity: 0;
  transition: opacity 0.2s, color 0.2s;
  padding: 8px;
  min-height: 44px;
}

.level-card:hover .delete-btn,
.level-card:hover .edit-btn { opacity: 1; }
.level-card .delete-btn:hover { color: #a85040; }
.level-card .edit-btn:hover { color: var(--moss-deep); }

.create-card {
  background: transparent;
  border: 2px dashed var(--eucalyptus);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: var(--moss-deep);
  min-height: 220px;
  font-family: 'Shippori Mincho B1', serif;
  cursor: pointer;
  transition: all 0.3s;
}

.create-card:hover {
  border-color: var(--moss);
  background: rgba(102,136,102,0.05);
  transform: translateY(-3px);
}

.create-card .plus {
  font-size: 40px;
  font-weight: 300;
  line-height: 1;
  color: var(--moss);
}

.create-card .label {
  font-size: 17px;
  letter-spacing: 0.05em;
}

.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 40px 20px;
  color: var(--ink-soft);
  font-style: italic;
  font-size: 18px;
}

/* BACK BUTTON */

.back-btn {
  background: transparent;
  border: none;
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  color: var(--ink-soft);
  cursor: pointer;
  padding: 10px 0;
  margin-bottom: 16px;
  letter-spacing: 0.04em;
  transition: color 0.2s, transform 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-height: 44px;
}

.back-btn::before {
  content: '←';
  font-size: 20px;
  transition: transform 0.2s;
}

.back-btn:hover { color: var(--moss-deep); }
.back-btn:hover::before { transform: translateX(-3px); }

/* PLAY VIEW */

.play-head {
  margin-bottom: 20px;
}

.play-title {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 32px;
  font-weight: 500;
  color: var(--ink);
  display: flex;
  align-items: baseline;
  gap: 14px;
  flex-wrap: wrap;
}

.play-title .size-label {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 16px;
  color: var(--ink-soft);
  font-weight: 400;
}

.play-title .crumb {
  color: var(--ink-soft);
  font-size: 18px;
  font-weight: 400;
  font-style: italic;
}

.puzzle-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

/* Scrollable outer container for large grids */
.puzzle-scroll {
  width: 100%;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}

.puzzle-wrap {
  display: inline-block;
  padding: 18px;
  background: var(--paper-warm);
  border: 1px solid var(--ink-faint);
  box-shadow: 0 4px 16px var(--paper-shadow);
  min-width: min-content;
}

.puzzle-grid {
  display: grid;
  font-family: 'Shippori Mincho B1', serif;
}

.clue-cell {
  background: transparent;
  font-size: var(--clue-size);
  font-weight: 600;
  display: flex;
  padding: 4px 2px;
  min-width: var(--cell-size);
  min-height: var(--cell-size);
  gap: 2px;
  transition: background 0.15s;
}

.clue-cell.row {
  flex-direction: row;
  align-items: center;
  justify-content: flex-end;
  padding: 2px 8px;
}

.clue-cell.col {
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
}

.clue-num {
  display: block;
  line-height: 1.1;
  padding: 0 2px;
  transition: opacity 0.3s;
  color: var(--ink);
}

.clue-num.done { opacity: 0.22; }

.clue-cell.highlighted {
  background: rgba(102,136,102,0.1);
}

.corner { background: transparent; }

.cell {
  width: var(--cell-size);
  height: var(--cell-size);
  background: var(--paper);
  border: 1px solid var(--paper-deep);
  cursor: pointer;
  position: relative;
  transition: background 0.08s, filter 0.08s;
  display: flex;
  align-items: center;
  justify-content: center;
  /* touch-action: none prevents scroll conflict when drawing */
  touch-action: none;
}

.cell:hover { filter: brightness(0.92); }

.cell.filled {
  border-color: rgba(0,0,0,0.25);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06),
              inset 1px 1px 2px rgba(255,255,255,0.08);
}

.cell.marked::after {
  content: '✕';
  color: var(--eucalyptus);
  font-size: calc(var(--cell-size) * 0.55);
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  line-height: 1;
}

.cell.auto-marked::after {
  color: var(--ink-soft);
  opacity: 0.55;
}

.cell.b-right { border-right: 2px solid var(--ink); }
.cell.b-bottom { border-bottom: 2px solid var(--ink); }

.cell.row-hover, .cell.col-hover {
  box-shadow: inset 0 0 0 100px rgba(168,151,96,0.16);
}
.cell.filled.row-hover, .cell.filled.col-hover {
  filter: brightness(0.88);
}

/* PALETTE */

.palette-bar {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: center;
  padding: 12px 16px;
  background: rgba(119,136,119,0.15);
  border-radius: 2px;
}

.palette-swatch {
  width: 52px;
  height: 52px;
  border-radius: 2px;
  border: 2px solid transparent;
  cursor: pointer;
  position: relative;
  transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
  background: var(--paper);
}

.palette-swatch:hover {
  transform: translateY(-2px);
}

.palette-swatch.active {
  border-color: var(--ink);
  transform: translateY(-3px);
  box-shadow: 0 4px 10px var(--paper-shadow);
}

.palette-swatch.mark {
  background: var(--paper);
  border: 2px solid var(--paper-deep);
  display: flex;
  align-items: center;
  justify-content: center;
}

.palette-swatch.mark::after {
  content: '✕';
  font-family: 'Cormorant Garamond', serif;
  color: var(--eucalyptus);
  font-size: 30px;
}

.palette-swatch.mark.active { border-color: var(--ink); }

.palette-swatch.erase {
  background: var(--paper);
  border: 2px dashed var(--eucalyptus);
  position: relative;
}

.palette-swatch.erase::after {
  content: '';
  position: absolute;
  inset: 12px;
  border: 1px solid var(--eucalyptus);
  border-radius: 50%;
  opacity: 0.6;
}

.palette-swatch.erase.active {
  border-color: var(--ink);
  border-style: solid;
}

.palette-divider {
  width: 1px;
  height: 32px;
  background: var(--ink-faint);
  margin: 0 4px;
}

/* CONTROLS */

.controls {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: center;
}

.btn {
  background: transparent;
  border: 1px solid var(--eucalyptus);
  color: var(--moss-deep);
  font-family: 'Shippori Mincho B1', serif;
  font-size: 14px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 11px 22px;
  min-height: 48px;
  cursor: pointer;
  transition: all 0.2s;
  border-radius: 1px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn:hover {
  background: var(--moss);
  color: var(--paper);
  border-color: var(--moss);
}

.btn.primary {
  background: var(--moss);
  color: var(--paper);
  border-color: var(--moss);
}

.btn.primary:hover {
  background: var(--moss-deep);
  border-color: var(--moss-deep);
}

.btn.subtle {
  border-color: var(--ink-faint);
  color: var(--ink-soft);
}

.btn.subtle:hover {
  border-color: var(--ink-soft);
  color: var(--ink);
  background: transparent;
}

.btn.danger {
  border-color: #a85040;
  color: #a85040;
}

.btn.danger:hover {
  background: #a85040;
  color: var(--paper);
}

.btn.gold {
  border-color: var(--gold);
  color: var(--gold);
}

.btn.gold:hover { background: var(--gold); color: var(--paper-warm); border-color: var(--gold); }

/* toggle button */
.btn.toggle .dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--ink-faint);
  transition: background 0.2s;
}

.btn.toggle.on .dot { background: var(--moss); box-shadow: 0 0 6px rgba(102,136,102,0.6); }
.btn.toggle.on { border-color: var(--moss); color: var(--moss-deep); }

/* WIN OVERLAY */

.win-overlay {
  position: fixed;
  inset: 0;
  background: rgba(204, 204, 170, 0.92);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fade-in 0.6s ease;
}

@keyframes fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}

.win-card {
  background: var(--paper-warm);
  border: 1px solid var(--moss);
  padding: 48px 60px;
  text-align: center;
  box-shadow: 0 16px 50px rgba(80,70,50,0.25);
  max-width: 460px;
  width: calc(100% - 40px);
  animation: rise 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
}

@keyframes rise {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.win-card .kanji-big {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 80px;
  font-weight: 800;
  color: var(--moss);
  line-height: 1;
  margin-bottom: 12px;
}

.win-card h2 {
  font-family: 'Shippori Mincho B1', serif;
  font-weight: 500;
  font-size: 30px;
  color: var(--ink);
  margin-bottom: 8px;
  letter-spacing: 0.02em;
}

.win-card p {
  color: var(--ink-soft);
  font-style: italic;
  font-size: 17px;
  margin-bottom: 28px;
}

.win-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

/* COMPOUND SELECTOR */

.compound-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 26px;
}

.compound-intro {
  text-align: center;
  max-width: 520px;
  color: var(--ink-soft);
  font-style: italic;
  font-size: 17px;
  line-height: 1.5;
}

.sub-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(140px, 1fr));
  gap: 16px;
  width: 100%;
  max-width: 520px;
  padding: 20px;
  background: var(--paper-warm);
  border: 1px solid var(--ink-faint);
  box-shadow: 0 4px 16px var(--paper-shadow);
  position: relative;
}

.sub-card {
  background: var(--paper);
  border: 1px solid var(--paper-deep);
  border-radius: 2px;
  padding: 18px 16px;
  cursor: pointer;
  position: relative;
  transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  min-height: 190px;
}

.sub-card:hover {
  transform: translateY(-2px);
  border-color: var(--moss);
  box-shadow: 0 6px 16px var(--paper-shadow);
}

.sub-card.solved {
  border-color: var(--moss);
  background: linear-gradient(160deg, var(--paper) 0%, rgba(102,136,102,0.12) 100%);
}

.sub-card .sub-kanji {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 38px;
  font-weight: 700;
  line-height: 1;
  color: var(--moss-deep);
}

.sub-card.solved .sub-kanji {
  color: var(--moss);
}

.sub-card .sub-name {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 18px;
  color: var(--ink);
  letter-spacing: 0.04em;
}

.sub-card .sub-preview {
  width: 100%;
  display: flex;
  justify-content: center;
  flex-grow: 1;
  align-items: center;
  padding: 6px 0;
}

.sub-card .sub-preview svg { max-width: 100%; height: auto; }

.sub-card .sub-status {
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-soft);
}

.sub-card.solved .sub-status {
  color: var(--moss);
  font-weight: 600;
}

.sub-card .sub-check {
  position: absolute;
  top: 10px;
  right: 12px;
  color: var(--moss);
  font-size: 18px;
  font-weight: 700;
}

.progress-pill {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  background: var(--paper-warm);
  border: 1px solid var(--ink-faint);
  border-radius: 22px;
  font-family: 'Shippori Mincho B1', serif;
  font-size: 15px;
  color: var(--ink);
  letter-spacing: 0.05em;
}

.progress-pill .count {
  color: var(--moss-deep);
  font-weight: 700;
}

.progress-pill.complete {
  border-color: var(--gold);
  background: linear-gradient(135deg, var(--paper-warm), #e2dec0);
}

.progress-pill.complete .count { color: var(--gold); }

/* COMBINED REVEAL */

.reveal-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
}

.reveal-frame {
  padding: 22px;
  background: var(--paper-warm);
  border: 2px solid var(--gold);
  box-shadow: 0 8px 28px rgba(80,70,50,0.25);
  animation: reveal-rise 0.9s cubic-bezier(0.15, 0.85, 0.2, 1);
  max-width: 100%;
  overflow: auto;
}

@keyframes reveal-rise {
  from { transform: translateY(30px) scale(0.97); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

.reveal-frame .combined-art {
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  background: var(--paper);
  max-width: 100%;
  height: auto;
}

.reveal-caption {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 24px;
  color: var(--ink);
  text-align: center;
}

.reveal-caption .kanji-mark {
  font-size: 32px;
  color: var(--gold);
  margin-right: 10px;
  vertical-align: -2px;
}

/* EDITOR */

.editor-head {
  display: flex;
  gap: 22px;
  margin-bottom: 24px;
  align-items: flex-end;
  flex-wrap: wrap;
}

.input-group { display: flex; flex-direction: column; gap: 6px; }

.input-group label {
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-soft);
  font-weight: 500;
}

.text-input {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 20px;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--eucalyptus);
  color: var(--ink);
  padding: 8px 0;
  min-width: 240px;
  transition: border-color 0.2s;
  outline: none;
}

.text-input:focus { border-bottom-color: var(--moss); }
.text-input::placeholder { color: var(--ink-faint); font-style: italic; }

.size-picker {
  display: flex;
  gap: 4px;
  background: rgba(119,136,119,0.18);
  padding: 4px;
  border-radius: 2px;
}

.size-btn {
  background: transparent;
  border: none;
  font-family: 'Shippori Mincho B1', serif;
  color: var(--ink-soft);
  padding: 10px 14px;
  min-height: 44px;
  cursor: pointer;
  font-size: 14px;
  border-radius: 1px;
  transition: all 0.2s;
}

.size-btn:hover { color: var(--ink); }
.size-btn.active {
  background: var(--paper);
  color: var(--moss-deep);
  box-shadow: 0 1px 3px var(--paper-shadow);
}

.editor-palette-row {
  display: flex;
  justify-content: center;
  margin-bottom: 18px;
}

.editor-hint {
  text-align: center;
  color: var(--ink-soft);
  font-style: italic;
  font-size: 15px;
  margin-bottom: 12px;
}

.editor-cell {
  width: var(--cell-size);
  height: var(--cell-size);
  background: var(--paper);
  border: 1px solid var(--paper-deep);
  cursor: pointer;
  transition: background 0.08s;
  touch-action: none;
}

.editor-cell:hover { filter: brightness(0.92); }

.editor-cell.filled {
  border-color: rgba(0,0,0,0.25);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
}

.editor-cell.b-right { border-right: 2px solid var(--ink); }
.editor-cell.b-bottom { border-bottom: 2px solid var(--ink); }

.editor-grid-wrap {
  display: flex;
  justify-content: center;
  padding: 18px;
  background: var(--paper-warm);
  border: 1px solid var(--ink-faint);
  margin-bottom: 22px;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}

.editor-grid { display: grid; }

/* AUTO-SAVE STATUS */
.save-status {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--ink-soft);
  letter-spacing: 0.04em;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 11px 16px;
  border: 1px solid transparent;
  min-width: 100px;
  min-height: 48px;
  justify-content: center;
  opacity: 0.85;
  transition: opacity 0.3s, color 0.3s, background 0.3s;
}

.save-status.done {
  color: var(--moss-deep);
  opacity: 1;
}

.save-status.done .check {
  color: var(--moss);
  font-weight: 700;
}

.save-status.saving .dot-saving {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--ink-soft);
  animation: pulse 1s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* TOAST */
.toast {
  position: fixed;
  bottom: max(30px, calc(20px + env(safe-area-inset-bottom)));
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: var(--paper);
  padding: 14px 28px;
  font-family: 'Shippori Mincho B1', serif;
  font-size: 15px;
  letter-spacing: 0.04em;
  z-index: 200;
  border-radius: 1px;
  animation: toast-in 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  white-space: nowrap;
}

@keyframes toast-in {
  from { transform: translate(-50%, 20px); opacity: 0; }
  to { transform: translate(-50%, 0); opacity: 1; }
}

/* FOOTER */
.footer {
  margin-top: 60px;
  padding-top: 20px;
  border-top: 1px solid var(--ink-faint);
  display: flex;
  justify-content: space-between;
  color: var(--ink-soft);
  font-size: 13px;
  font-style: italic;
  letter-spacing: 0.04em;
}

.footer .kanji-mark {
  font-family: 'Shippori Mincho B1', serif;
  font-style: normal;
  color: var(--moss);
}

@media (max-width: 500px) {
  #app { padding: 18px 14px max(60px, calc(50px + env(safe-area-inset-bottom))); }
  .puzzle-wrap { padding: 10px; }
  .level-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
  .play-title { font-size: 24px; }
  .section-title { font-size: 22px; }
  .win-card { padding: 24px 16px; }
  .win-card .kanji-big { font-size: 60px; }
  .win-card h2 { font-size: 24px; }
  .editor-head { flex-direction: column; align-items: stretch; }
  .text-input { min-width: 0; width: 100%; }
  .sub-card { min-height: 170px; padding: 14px 10px; }
  .sub-card .sub-kanji { font-size: 32px; }
  .controls { gap: 8px; }
  .btn { padding: 10px 14px; font-size: 13px; }
}

/* Controls keep manipulation (fast tap, no double-tap zoom) */
.btn, .size-btn, .filter-tab, .palette-swatch, .sub-card,
.back-btn, .create-card, .level-card { touch-action: manipulation; }

// ── storage (localStorage) ────────────────────
const STORAGE_KEY  = 'nonogram:custom-levels-v2';
const SOLVED_KEY   = 'nonogram:solved';
const SETTINGS_KEY = 'nonogram:settings';

async function loadCustomLevels() {
  try {
    const v = localStorage.getItem(STORAGE_KEY);
    if (v) return JSON.parse(v);
  } catch {}
  // migrate legacy v1 (binary → color)
  try {
    const legacy = localStorage.getItem('nonogram:custom-levels');
    if (legacy) {
      const lvls = JSON.parse(legacy);
      return lvls.map(lvl => ({
        ...lvl,
        solution: lvl.solution.map(row => row.map(v => v === 1 ? COLOR.moss : 0)),
      }));
    }
  } catch {}
  return [];
}

async function saveCustomLevels(levels) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(levels)); } catch {}
}

async function loadSolved() {
  try {
    const v = localStorage.getItem(SOLVED_KEY);
    return v ? JSON.parse(v) : [];
  } catch { return []; }
}

async function markSolved(id) {
  const list = await loadSolved();
  if (!list.includes(id)) {
    list.push(id);
    try { localStorage.setItem(SOLVED_KEY, JSON.stringify(list)); } catch {}
  }
}

let settings = { autoCross: true };

async function loadSettings() {
  try {
    const v = localStorage.getItem(SETTINGS_KEY);
    if (v) Object.assign(settings, JSON.parse(v));
  } catch {}
}

async function saveSettings() {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); } catch {}
}

// ── puzzle math (color-aware) ─────────────────
function cellColor(v) {
  if (!v || v === 'mark') return null;
  if (v === 1 || v === true) return COLOR.moss;
  return v;
}

function computeClues(solution) {
  const n = solution.length;
  const rowClues = [];
  const colClues = [];

  const runs = (getCell, len) => {
    const clues = [];
    let curColor = null;
    let count = 0;
    for (let i = 0; i < len; i++) {
      const color = cellColor(getCell(i));
      if (color === null) {
        if (count > 0) clues.push({ count, color: curColor });
        count = 0; curColor = null;
      } else if (color === curColor) {
        count++;
      } else {
        if (count > 0) clues.push({ count, color: curColor });
        curColor = color; count = 1;
      }
    }
    if (count > 0) clues.push({ count, color: curColor });
    if (clues.length === 0) clues.push({ count: 0, color: COLOR.moss });
    return clues;
  };

  for (let r = 0; r < n; r++) rowClues.push(runs(c => solution[r][c], n));
  for (let c = 0; c < n; c++) colClues.push(runs(r => solution[r][c], n));
  return { rowClues, colClues };
}

function isComplete(state, solution) {
  const n = solution.length;
  for (let r = 0; r < n; r++) {
    for (let c = 0; c < n; c++) {
      if (cellColor(solution[r][c]) !== cellColor(state[r][c])) return false;
    }
  }
  return true;
}

function isRowDone(state, solution, r) {
  const n = solution.length;
  for (let c = 0; c < n; c++) {
    if (cellColor(state[r][c]) !== cellColor(solution[r][c])) return false;
  }
  return true;
}

function isColumnDone(state, solution, c) {
  const n = solution.length;
  for (let r = 0; r < n; r++) {
    if (cellColor(state[r][c]) !== cellColor(solution[r][c])) return false;
  }
  return true;
}

function makeEmpty(size) {
  return Array.from({length: size}, () => new Array(size).fill(0));
}

function colorsInPuzzle(solution) {
  const set = new Set();
  for (const row of solution) {
    for (const v of row) {
      const c = cellColor(v);
      if (c) set.add(c);
    }
  }
  return [...set];
}

// ── preview SVG ───────────────────────────────
function previewSVG(solution) {
  const n = solution.length;
  const cell = n <= 10 ? 8 : 5;
  const pad = 2;
  const w = n * cell + pad * 2;
  const target = Math.min(140, w * (n <= 10 ? 2 : 1.4));
  let svg = `<svg viewBox="0 0 ${w} ${w}" width="${target}" xmlns="http://www.w3.org/2000/svg">`;
  svg += `<rect width="${w}" height="${w}" fill="#ccccaa"/>`;
  for (let r = 0; r < n; r++) {
    for (let c = 0; c < n; c++) {
      const color = cellColor(solution[r][c]);
      if (color) svg += `<rect x="${pad + c*cell}" y="${pad + r*cell}" width="${cell}" height="${cell}" fill="${color}"/>`;
    }
  }
  svg += `</svg>`;
  return svg;
}

function compoundPreviewSVG(compound, solvedIds) {
  const subSize = compound.subSize;
  const cell = 3;
  const sd = subSize * cell;
  const seam = 3;
  const pad = 2;
  const w = pad * 2 + sd * 2 + seam;

  let svg = `<svg viewBox="0 0 ${w} ${w}" width="140" xmlns="http://www.w3.org/2000/svg">`;
  svg += `<rect width="${w}" height="${w}" fill="#b8b896"/>`;

  for (let i = 0; i < 4; i++) {
    const sub = compound.subs[i];
    const subKey = compound.id + ':' + sub.id;
    const isSolved = solvedIds.includes(subKey);
    const x = pad + (i % 2) * (sd + seam);
    const y = pad + Math.floor(i / 2) * (sd + seam);

    if (isSolved) {
      svg += `<rect x="${x}" y="${y}" width="${sd}" height="${sd}" fill="#ccccaa"/>`;
      for (let r = 0; r < subSize; r++) {
        for (let c = 0; c < subSize; c++) {
          const color = cellColor(sub.solution[r][c]);
          if (color) svg += `<rect x="${x + c*cell}" y="${y + r*cell}" width="${cell}" height="${cell}" fill="${color}"/>`;
        }
      }
    } else {
      svg += `<rect x="${x}" y="${y}" width="${sd}" height="${sd}" fill="#ccccaa" opacity="0.55"/>`;
      svg += `<text x="${x + sd/2}" y="${y + sd/2 + sd*0.18}" font-family="serif" font-weight="700" font-size="${sd*0.55}" fill="#778877" text-anchor="middle" opacity="0.5">${sub.kanji}</text>`;
    }
  }
  svg += `</svg>`;
  return svg;
}

function subPreviewSVG(sub, isSolved) {
  const n = sub.solution.length;
  const cell = 6;
  const pad = 2;
  const w = n * cell + pad * 2;
  let svg = `<svg viewBox="0 0 ${w} ${w}" width="100" xmlns="http://www.w3.org/2000/svg">`;
  svg += `<rect width="${w}" height="${w}" fill="#ccccaa" ${isSolved ? '' : 'opacity="0.4"'}/>`;
  if (isSolved) {
    for (let r = 0; r < n; r++) {
      for (let c = 0; c < n; c++) {
        const color = cellColor(sub.solution[r][c]);
        if (color) svg += `<rect x="${pad + c*cell}" y="${pad + r*cell}" width="${cell}" height="${cell}" fill="${color}"/>`;
      }
    }
  } else {
    svg += `<text x="${w/2}" y="${w/2 + w*0.16}" font-family="serif" font-weight="700" font-size="${w*0.45}" fill="#778877" text-anchor="middle" opacity="0.4">?</text>`;
  }
  svg += `</svg>`;
  return svg;
}

// ── combined reveal ───────────────────────────
function combinedRevealSVG(compound) {
  const subSize = compound.subSize;
  const cell = 14;
  const seam = 4;
  const pad = 4;
  const sd = subSize * cell;
  const w = pad * 2 + sd * 2 + seam;

  let svg = `<svg viewBox="0 0 ${w} ${w}" class="combined-art" width="${Math.min(440, w)}" xmlns="http://www.w3.org/2000/svg">`;
  svg += `<rect width="${w}" height="${w}" fill="#b8b896"/>`;
  for (let i = 0; i < 4; i++) {
    const sub = compound.subs[i];
    const x = pad + (i % 2) * (sd + seam);
    const y = pad + Math.floor(i / 2) * (sd + seam);
    svg += `<rect x="${x}" y="${y}" width="${sd}" height="${sd}" fill="#ccccaa"/>`;
    for (let r = 0; r < subSize; r++) {
      for (let c = 0; c < subSize; c++) {
        const color = cellColor(sub.solution[r][c]);
        if (color) svg += `<rect x="${x + c*cell}" y="${y + r*cell}" width="${cell}" height="${cell}" fill="${color}"/>`;
      }
    }
  }
  svg += `</svg>`;
  return svg;
}

};

let dragAction = null;
let editorDrag = null;
let lpTimer = null; // long-press timer for mobile mark gesture

// auto-save state
let autoSaveTimer = null;
let saveStatus = 'idle';

function scheduleAutoSave() {
  if (state.view !== 'editor') return;
  const hasContent = state.editorGrid && state.editorGrid.flat().some(v => v !== 0);
  if (!state.editingId && !hasContent) return;

  saveStatus = 'saving';
  updateSaveStatusUI();
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => { performAutoSave(); }, 500);
}

async function performAutoSave() {
  autoSaveTimer = null;
  if (state.view !== 'editor' && !state.editingId) return;

  const hasContent = state.editorGrid && state.editorGrid.flat().some(v => v !== 0);
  if (!state.editingId && !hasContent) {
    saveStatus = 'idle';
    updateSaveStatusUI();
    return;
  }

  saveStatus = 'saving';
  updateSaveStatusUI();

  if (state.editingId) {
    const idx = state.customLevels.findIndex(l => l.id === state.editingId);
    if (idx >= 0) {
      state.customLevels[idx] = {
        ...state.customLevels[idx],
        name: state.editorName.trim(),
        size: state.editorSize,
        solution: state.editorGrid.map(r => [...r]),
      };
    } else {
      state.customLevels.push({
        id: state.editingId,
        name: state.editorName.trim(),
        size: state.editorSize,
        solution: state.editorGrid.map(r => [...r]),
        created: Date.now(),
      });
    }
  } else {
    const newId = 'custom-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
    state.editingId = newId;
    state.customLevels.push({
      id: newId,
      name: state.editorName.trim(),
      size: state.editorSize,
      solution: state.editorGrid.map(r => [...r]),
      created: Date.now(),
    });
  }

  await saveCustomLevels(state.customLevels);
  saveStatus = 'saved';
  updateSaveStatusUI();
}

async function flushAutoSave() {
  if (autoSaveTimer) {
    clearTimeout(autoSaveTimer);
    autoSaveTimer = null;
    await performAutoSave();
  }
}

function updateSaveStatusUI() {
  const el = document.querySelector('.save-status');
  if (!el) return;
  el.classList.remove('done', 'saving');
  if (saveStatus === 'saving') {
    el.classList.add('saving');
    el.innerHTML = '<span class="dot-saving"></span>Saving…';
  } else if (saveStatus === 'saved') {
    el.classList.add('done');
    el.innerHTML = '<span class="check">✓</span>Saved';
  } else {
    el.innerHTML = '<span style="opacity:0.5">Not yet saved</span>';
  }
}

function $el(tag, attrs = {}, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') el.className = v;
    else if (k === 'style') el.style.cssText = v;
    else if (k.startsWith('on') && typeof v === 'function') {
      el.addEventListener(k.slice(2).toLowerCase(), v);
    } else if (k === 'html') el.innerHTML = v;
    else if (v !== null && v !== undefined) el.setAttribute(k, v);
  }
  for (const c of children) {
    if (c === null || c === undefined || c === false) continue;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return el;
}

function toast(msg) {
  const t = $el('div', { class: 'toast' }, msg);
  document.body.appendChild(t);
  setTimeout(() => {
    t.style.transition = 'opacity 0.4s, transform 0.4s';
    t.style.opacity = '0';
    t.style.transform = 'translate(-50%, -10px)';
    setTimeout(() => t.remove(), 400);
  }, 2200);
}

function compoundSolvedCount(compound) {
  return compound.subs.filter(s => state.solved.includes(compound.id + ':' + s.id)).length;
}

function renderLibrary() {
  const wrap = $el('div', {});
  const tab = (key, label) => $el('button', {
    class: 'filter-tab' + (state.filter === key ? ' active' : ''),
    onclick: () => { state.filter = key; render(); }
  }, label);

  wrap.appendChild($el('div', { class: 'section-head' },
    $el('h2', { class: 'section-title', html: '<span class="accent">絵</span>Library' }),
    $el('div', { class: 'filter-tabs' },
      tab('all', 'All'), tab('system', 'Built-in'), tab('custom', 'Mine')
    )
  ));

  const grid = $el('div', { class: 'level-grid' });
  let levels = [];
  if (state.filter === 'all') levels = [...COMPOUND_LEVELS, ...SYSTEM_LEVELS, ...state.customLevels];
  else if (state.filter === 'system') levels = [...COMPOUND_LEVELS, ...SYSTEM_LEVELS];
  else levels = state.customLevels;

  for (const level of levels) {
    if (level.type === 'compound') {
      grid.appendChild(renderCompoundCard(level));
    } else {
      grid.appendChild(renderRegularCard(level));
    }
  }

  grid.appendChild($el('article', {
    class: 'level-card create-card',
    onclick: () => openEditor(null)
  },
    $el('div', { class: 'plus' }, '+'),
    $el('div', { class: 'label' }, 'Create')
  ));

  if (levels.length === 0 && state.filter === 'custom') {
    grid.insertBefore(
      $el('div', { class: 'empty-state' }, 'No custom puzzles yet. Make one →'),
      grid.lastChild
    );
  }

  wrap.appendChild(grid);
  return wrap;
}

function renderRegularCard(level) {
  const isCustom = !level.id.startsWith('sys-');
  const isSolved = state.solved.includes(level.id);
  const card = $el('article', {
    class: 'level-card' + (isSolved ? ' solved' : ''),
    onclick: (e) => {
      if (e.target.classList.contains('delete-btn') || e.target.classList.contains('edit-btn')) return;
      openLevel(level);
    }
  });
  if (level.kanji && !isCustom) {
    card.appendChild($el('span', { class: 'level-badge' }, level.kanji));
  } else if (isCustom) {
    card.appendChild($el('span', { class: 'level-badge', style: 'color: var(--moss)' }, 'YOURS'));
  }
  card.appendChild($el('div', { class: 'preview', html: previewSVG(level.solution) }));
  card.appendChild($el('div', { class: 'level-meta' },
    $el('div', { class: 'level-name' }, level.name || 'Untitled'),
    $el('div', { class: 'level-size' }, `${level.size} × ${level.size}`)
  ));
  if (isCustom) {
    card.appendChild($el('button', {
      class: 'edit-btn',
      title: 'Edit',
      onclick: (e) => { e.stopPropagation(); openEditor(level); }
    }, 'edit'));
    card.appendChild($el('button', {
      class: 'delete-btn',
      title: 'Delete',
      onclick: async (e) => {
        e.stopPropagation();
        if (confirm(`Delete "${level.name || 'Untitled'}"?`)) {
          state.customLevels = state.customLevels.filter(l => l.id !== level.id);
          await saveCustomLevels(state.customLevels);
          toast('Removed.');
          render();
        }
      }
    }, 'delete'));
  }
  return card;
}

function renderCompoundCard(compound) {
  const solvedCount = compoundSolvedCount(compound);
  const total = compound.subs.length;
  const isAllDone = solvedCount === total;
  const card = $el('article', {
    class: 'level-card compound' + (isAllDone ? ' all-done' : ''),
    onclick: () => openCompound(compound),
  });
  card.appendChild($el('span', { class: 'level-badge', style: 'color: var(--gold)' }, compound.kanji));
  card.appendChild($el('div', { class: 'preview', html: compoundPreviewSVG(compound, state.solved) }));
  card.appendChild($el('div', { class: 'level-meta' },
    $el('div', { class: 'level-name' }, compound.name),
    $el('div', { class: 'level-size' }, `${solvedCount} / ${total} tiles`)
  ));
  return card;
}

    card.appendChild($el('div', { class: 'sub-status' }, solved ? 'complete' : 'untouched'));

    stage.appendChild($el('button', {

  state.parentLevel = null;
  state.currentLevel = level;
  state.playGrid = makeEmpty(level.size);
  const cols = colorsInPuzzle(level.solution);
  state.playBrush = cols[0] || COLOR.moss;
  state._winShown = false;
  render();

function renderPlay() {
  const level = state.currentLevel;
  const { rowClues, colClues } = computeClues(level.solution);
  const usedColors = colorsInPuzzle(level.solution);

  const wrap = $el('div', {});

  const isTest = level.id === '__test__';
  const backLabel = isTest ? 'Editor' : (state.parentLevel ? state.parentLevel.name : 'Library');
  wrap.appendChild($el('button', {
    class: 'back-btn',
    onclick: () => {
      if (isTest) { state.view = 'editor'; state.currentLevel = null; }
      else if (state.parentLevel) { state.view = 'compound'; state.currentLevel = null; }
      else { state.view = 'library'; state.currentLevel = null; }
      render();
    }
  }, backLabel));

  const titleEls = [
    level.name,
    $el('span', { class: 'size-label' }, `${level.size} × ${level.size}`)
  ];
  if (level.isSubLevel) {
    titleEls.unshift($el('span', { class: 'crumb' }, `${level.parentName} · `));
  }
  wrap.appendChild($el('div', { class: 'play-head' },
    $el('h1', { class: 'play-title' }, ...titleEls)
  ));

  const stage = $el('div', { class: 'puzzle-stage' });

  const palette = $el('div', { class: 'palette-bar' });
  for (const col of usedColors) {
    palette.appendChild($el('div', {
      class: 'palette-swatch' + (state.playBrush === col ? ' active' : ''),
      title: 'Paint',
      style: `background:${col}`,
      onclick: () => { state.playBrush = col; render(); }
    }));
  }
  palette.appendChild($el('div', { class: 'palette-divider' }));
  palette.appendChild($el('div', {
    class: 'palette-swatch mark' + (state.playBrush === 'mark' ? ' active' : ''),
    title: 'Mark',
    onclick: () => { state.playBrush = 'mark'; render(); }
  }));
  stage.appendChild(palette);

  stage.appendChild(buildPuzzleGrid(level, rowClues, colClues));

  const controls = $el('div', { class: 'controls' });
  controls.appendChild($el('button', {
    class: 'btn toggle' + (settings.autoCross ? ' on' : ''),
    onclick: async () => {
      settings.autoCross = !settings.autoCross;
      await saveSettings();
      if (settings.autoCross) applyAllAutoCross();
      render();
    },
    title: 'Auto-mark empty cells when a row or column is fully solved'
  },
    $el('span', { class: 'dot' }),
    'Auto-Cross'
  ));
  controls.appendChild($el('button', {
    class: 'btn subtle',
    onclick: () => {
      if (state.playGrid.flat().some(v => v !== 0)) {
        if (confirm('Clear the board?')) {
          state.playGrid = makeEmpty(level.size);
          state._winShown = false;
          render();
        }
      }
    }
  }, 'Reset'));
  controls.appendChild($el('button', {
    class: 'btn subtle',
    onclick: () => {
      if (confirm('Reveal the solution? This will not count as solved.')) {
        state.playGrid = level.solution.map(row => row.map(v => cellColor(v) || 0));
        render();
      }
    }
  }, 'Reveal'));
  stage.appendChild(controls);
  wrap.appendChild(stage);

  if (isComplete(state.playGrid, level.solution) && !state._winShown) {
    state._winShown = true;
    setTimeout(() => showWin(level), 350);
  }
  return wrap;
}

function buildPuzzleGrid(level, rowClues, colClues) {
  const n = level.size;
  let cellSize, clueSize;
  if (n <= 5)       { cellSize = 72; clueSize = 22; }
  else if (n <= 10) { cellSize = 56; clueSize = 19; }
  else if (n <= 15) { cellSize = 44; clueSize = 15; }
  else              { cellSize = 36; clueSize = 13; }

  const maxRow = Math.max(...rowClues.map(c => c.length));
  const maxCol = Math.max(...colClues.map(c => c.length));

  // Outer scrollable wrapper so large grids don't break layout
  const scroll = $el('div', { class: 'puzzle-scroll' });
  const wrap = $el('div', { class: 'puzzle-wrap' });

  // Prevent page scroll while drawing over cells
  wrap.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

  const grid = $el('div', {
    class: 'puzzle-grid',
    style: `--cell-size:${cellSize}px;--clue-size:${clueSize}px;grid-template-columns:repeat(${n + 1}, auto);`
  });

  // Mobile touch-drag: elementFromPoint is reliable across cell boundaries
  grid.addEventListener('touchmove', (e) => {
    clearTimeout(lpTimer); lpTimer = null;
    if (dragAction === null) return;
    const touch = e.touches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (!el || el.dataset.r === undefined) return;
    onPlayPointerEnter(parseInt(el.dataset.r), parseInt(el.dataset.c));
  }, { passive: true });

  grid.appendChild($el('div', { class: 'corner' }));

  for (let c = 0; c < n; c++) {
    const cell = $el('div', {
      class: 'clue-cell col',
      'data-col': c,
      style: `min-height:${maxCol * (clueSize + 3) + 8}px;`
    });
    const done = isColumnDone(state.playGrid, level.solution, c);
    for (const clue of colClues[c]) {
      cell.appendChild($el('span', {
        class: 'clue-num' + (done ? ' done' : ''),
        style: `color:${clue.color};`
      }, String(clue.count)));
    }
    grid.appendChild(cell);
  }

  for (let r = 0; r < n; r++) {
    const clueCell = $el('div', {
      class: 'clue-cell row',
      'data-row': r,
      style: `min-width:${maxRow * (clueSize + 8) + 10}px;`
    });
    const done = isRowDone(state.playGrid, level.solution, r);
    for (const clue of rowClues[r]) {
      clueCell.appendChild($el('span', {
        class: 'clue-num' + (done ? ' done' : ''),
        style: `color:${clue.color};`
      }, String(clue.count)));
    }
    grid.appendChild(clueCell);

    for (let c = 0; c < n; c++) {
      const v = state.playGrid[r][c];
      const color = cellColor(v);
      const classes = ['cell'];
      if (color) classes.push('filled');
      if (v === 'mark') classes.push('marked');
      if ((c + 1) % 5 === 0 && c < n - 1) classes.push('b-right');
      if ((r + 1) % 5 === 0 && r < n - 1) classes.push('b-bottom');

      const cell = $el('div', {
        class: classes.join(' '),
        'data-r': r,
        'data-c': c,
        style: color ? `background:${color};` : '',
        onpointerdown: (e) => onPlayPointerDown(r, c, e),
        onpointerenter: () => onPlayPointerEnter(r, c),
        oncontextmenu: (e) => { e.preventDefault(); handleCellRight(r, c); },
        onmouseenter: () => highlightLine(r, c, true),
        onmouseleave: () => highlightLine(r, c, false),
      });
      // Long-press (600ms) toggles a mark — mobile replacement for right-click
      cell.addEventListener('touchstart', () => {
        lpTimer = setTimeout(() => {
          lpTimer = null;
          handleCellRight(r, c);
          if (navigator.vibrate) navigator.vibrate(40);
        }, 600);
      }, { passive: true });
      cell.addEventListener('touchend',   () => { clearTimeout(lpTimer); lpTimer = null; });
      cell.addEventListener('touchcancel',() => { clearTimeout(lpTimer); lpTimer = null; });
      grid.appendChild(cell);
    }
  }

  wrap.appendChild(grid);
  scroll.appendChild(wrap);
  return scroll;
}

// ── play-mode cell interactions ───────────────
function updateCellDOM(r, c) {
  const v = state.playGrid[r][c];
  const el = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
  if (!el) return;
  const color = cellColor(v);
  el.classList.remove('filled', 'marked', 'auto-marked');
  el.style.background = '';
  if (color) {
    el.classList.add('filled');
    el.style.background = color;
  } else if (v === 'mark') {
    el.classList.add('marked');
  } else if (v === 'auto-mark') {
    el.classList.add('marked', 'auto-marked');
  }
}

function updateLineClues(r, c) {
  const grid = document.querySelector('.puzzle-grid');
  if (!grid || !state.currentLevel) return;
  const sol = state.currentLevel.solution;
  if (r !== null) {
    const rowEl = grid.querySelector(`.clue-cell.row[data-row="${r}"]`);
    if (rowEl) {
      const done = isRowDone(state.playGrid, sol, r);
      rowEl.querySelectorAll('.clue-num').forEach(n => n.classList.toggle('done', done));
    }
  }
  if (c !== null) {
    const colEl = grid.querySelector(`.clue-cell.col[data-col="${c}"]`);
    if (colEl) {
      const done = isColumnDone(state.playGrid, sol, c);
      colEl.querySelectorAll('.clue-num').forEach(n => n.classList.toggle('done', done));
    }
  }
}

function autoCrossLine(kind, idx) {
  const sol = state.currentLevel.solution;
  const n = sol.length;
  if (kind === 'row') {
    for (let c = 0; c < n; c++) {
      if (sol[idx][c] === 0 && state.playGrid[idx][c] === 0) {
        state.playGrid[idx][c] = 'auto-mark';
        updateCellDOM(idx, c);
      }
    }
  } else {
    for (let r = 0; r < n; r++) {
      if (sol[r][idx] === 0 && state.playGrid[r][idx] === 0) {
        state.playGrid[r][idx] = 'auto-mark';
        updateCellDOM(r, idx);
      }
    }
  }
}

function applyCellInPlay(r, c, value) {
  state.playGrid[r][c] = value;
  updateCellDOM(r, c);

  if (settings.autoCross && state.currentLevel) {
    const sol = state.currentLevel.solution;
    if (isRowDone(state.playGrid, sol, r)) autoCrossLine('row', r);
    if (isColumnDone(state.playGrid, sol, c)) autoCrossLine('col', c);
  }
  updateLineClues(r, c);
}

function applyAllAutoCross() {
  if (!state.currentLevel) return;
  const sol = state.currentLevel.solution;
  const n = sol.length;
  for (let r = 0; r < n; r++) {
    if (isRowDone(state.playGrid, sol, r)) autoCrossLine('row', r);
  }
  for (let c = 0; c < n; c++) {
    if (isColumnDone(state.playGrid, sol, c)) autoCrossLine('col', c);
  }
}

function onPlayPointerDown(r, c, e) {
  e.preventDefault();
  if (e.button === 2) return;
  const cur = state.playGrid[r][c];
  const brush = state.playBrush;
  const effectiveCur = (cur === 'auto-mark') ? 0 : cur;
  if (effectiveCur === brush) {
    dragAction = 0;
  } else {
    dragAction = brush;
  }
  applyCellInPlay(r, c, dragAction);
}

function onPlayPointerEnter(r, c) {
  if (dragAction === null) return;
  const cur = state.playGrid[r][c];
  const effectiveCur = (cur === 'auto-mark') ? 0 : cur;
  if (effectiveCur === dragAction) return;
  if (dragAction === 0) {
    if (cur !== 0 && cur !== 'auto-mark') {
      applyCellInPlay(r, c, 0);
    }
    return;
  }
  applyCellInPlay(r, c, dragAction);
}

function handleCellRight(r, c) {
  const cur = state.playGrid[r][c];
  const newVal = (cur === 'mark') ? 0 : 'mark';
  applyCellInPlay(r, c, newVal);
  checkAndShowWin();
}

function checkAndShowWin() {
  if (state._winShown || !state.currentLevel) return;
  if (isComplete(state.playGrid, state.currentLevel.solution)) {
    state._winShown = true;
    setTimeout(() => showWin(state.currentLevel), 350);
  }
}

function highlightLine(r, c, on) {
  if (dragAction !== null) return;
  const grid = document.querySelector('.puzzle-grid');
  if (!grid) return;
  grid.querySelectorAll('.cell').forEach(el => el.classList.remove('row-hover', 'col-hover'));
  grid.querySelectorAll('.clue-cell').forEach(el => el.classList.remove('highlighted'));
  if (!on) return;
  grid.querySelectorAll(`.cell[data-r="${r}"]`).forEach(el => el.classList.add('row-hover'));
  grid.querySelectorAll(`.cell[data-c="${c}"]`).forEach(el => el.classList.add('col-hover'));
  const rc = grid.querySelector(`.clue-cell.row[data-row="${r}"]`);
  if (rc) rc.classList.add('highlighted');
  const cc = grid.querySelector(`.clue-cell.col[data-col="${c}"]`);
  if (cc) cc.classList.add('highlighted');
}

// ── win overlay ───────────────────────────────
function showWin(level) {
  markSolved(level.id);
  if (!state.solved.includes(level.id)) state.solved.push(level.id);

  const isSub = !!level.isSubLevel;
  const overlay = $el('div', { class: 'win-overlay' });
  const card = $el('div', { class: 'win-card' });
  card.appendChild($el('div', { class: 'kanji-big' }, level.kanji || '✓'));
  card.appendChild($el('h2', {}, 'Solved'));

  if (isSub) {
    const compound = state.parentLevel;
    const solvedCount = compoundSolvedCount(compound);
    const total = compound.subs.length;
    const isLast = solvedCount === total;
    card.appendChild($el('p', {}, isLast
      ? `Final tile complete — "${compound.name}" is whole.`
      : `${level.name} complete. ${total - solvedCount} more to go.`
    ));
    const actions = $el('div', { class: 'win-actions' });
    actions.appendChild($el('button', {
      class: 'btn',
      onclick: () => {
        overlay.remove();
        state._winShown = false;
        state.playGrid = makeEmpty(level.size);
        render();
      }
    }, 'Play Again'));
    if (isLast) {
      actions.appendChild($el('button', {
        class: 'btn primary gold',
        onclick: () => {
          overlay.remove();
          state._winShown = false;
          state.view = 'compound-reveal';
          state.currentLevel = null;
          render();
        }
      }, '✦ View Combined'));
    } else {
      actions.appendChild($el('button', {
        class: 'btn primary',
        onclick: () => {
          overlay.remove();
          state._winShown = false;
          state.view = 'compound';
          state.currentLevel = null;
          render();
        }
      }, 'Back to Tiles'));
    }
    card.appendChild(actions);
  } else {
    card.appendChild($el('p', {}, `"${level.name}" — quiet patience rewarded.`));
    card.appendChild($el('div', { class: 'win-actions' },
      $el('button', {
        class: 'btn',
        onclick: () => {
          overlay.remove();
          state._winShown = false;
          state.playGrid = makeEmpty(level.size);
          render();
        }
      }, 'Play Again'),
      $el('button', {
        class: 'btn primary',
        onclick: () => {
          overlay.remove();
          state._winShown = false;
          state.view = 'library';
          state.currentLevel = null;
          render();
        }
      }, 'Library')
    ));
  }

  overlay.appendChild(card);
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) { overlay.remove(); state._winShown = false; }
  });
  document.body.appendChild(overlay);
}

// ── editor ────────────────────────────────────
function openEditor(existing) {
  state.view = 'editor';
  state.parentLevel = null;
  state.currentLevel = null;
  if (existing) {
    state.editorSize = existing.size;
    state.editorGrid = existing.solution.map(r => r.map(v => cellColor(v) || 0));
    state.editorName = existing.name;
    state.editingId = existing.id;
    saveStatus = 'saved';
  } else {
    state.editorSize = 10;
    state.editorGrid = makeEmpty(10);
    state.editorName = '';
    state.editingId = null;
    saveStatus = 'idle';
  }
  state.editorBrush = COLOR.moss;
  clearTimeout(autoSaveTimer);
  autoSaveTimer = null;
  render();
}

function renderEditor() {
  const wrap = $el('div', {});
  wrap.appendChild($el('button', {
    class: 'back-btn',
    onclick: async () => { await flushAutoSave(); state.view = 'library'; render(); }
  }, 'Library'));

  const sizeBtn = (s) => $el('button', {
    class: 'size-btn' + (state.editorSize === s ? ' active' : ''),
    onclick: async () => {
      if (state.editorGrid.flat().some(v => v) && state.editorSize !== s) {
        if (!confirm('Change size? This will clear your drawing.')) return;
      }
      state.editorSize = s;
      state.editorGrid = makeEmpty(s);
      if (state.editingId) scheduleAutoSave();
      render();
    }
  }, `${s} × ${s}`);

  wrap.appendChild($el('div', { class: 'section-head' },
    $el('h2', { class: 'section-title', html: '<span class="accent">作</span>Compose' })
  ));

  wrap.appendChild($el('div', { class: 'editor-head' },
    $el('div', { class: 'input-group' },
      $el('label', {}, 'Title'),
      (() => {
        const inp = $el('input', {
          class: 'text-input', type: 'text', placeholder: 'Name your puzzle…',
          maxlength: 40, value: state.editorName,
        });
        inp.addEventListener('input', (e) => { state.editorName = e.target.value; scheduleAutoSave(); });
        return inp;
      })()
    ),
    $el('div', { class: 'input-group' },
      $el('label', {}, 'Size'),
      $el('div', { class: 'size-picker' },
        sizeBtn(5), sizeBtn(10), sizeBtn(15), sizeBtn(20)
      )
    )
  ));

  const palette = $el('div', { class: 'palette-bar' });
  for (const p of PALETTE_ARR) {
    palette.appendChild($el('div', {
      class: 'palette-swatch' + (state.editorBrush === p.hex ? ' active' : ''),
      title: p.name,
      style: `background:${p.hex}`,
      onclick: () => { state.editorBrush = p.hex; render(); }
    }));
  }
  palette.appendChild($el('div', { class: 'palette-divider' }));
  palette.appendChild($el('div', {
    class: 'palette-swatch erase' + (state.editorBrush === 0 ? ' active' : ''),
    title: 'Eraser',
    onclick: () => { state.editorBrush = 0; render(); }
  }));
  wrap.appendChild($el('div', { class: 'editor-palette-row' }, palette));

  wrap.appendChild($el('div', { class: 'editor-hint' },
    'Pick a color, then tap or drag to paint.'
  ));

  const n = state.editorSize;
  let cellSize;
  if (n <= 5)       cellSize = 72;
  else if (n <= 10) cellSize = 56;
  else if (n <= 15) cellSize = 44;
  else              cellSize = 36;

  const gridWrap = $el('div', { class: 'editor-grid-wrap' });

  // Prevent page scroll while drawing
  gridWrap.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

  const grid = $el('div', {
    class: 'editor-grid',
    style: `--cell-size:${cellSize}px;grid-template-columns:repeat(${n}, ${cellSize}px);`
  });

  const apply = (r, c, val) => {
    state.editorGrid[r][c] = val;
    const el = document.querySelector(`.editor-cell[data-r="${r}"][data-c="${c}"]`);
    if (el) {
      if (val) { el.classList.add('filled'); el.style.background = val; }
      else { el.classList.remove('filled'); el.style.background = ''; }
    }
    scheduleAutoSave();
  };

  const onDown = (r, c, e) => {
    e.preventDefault();
    const cur = state.editorGrid[r][c];
    if (state.editorBrush === 0) editorDrag = 0;
    else if (cur === state.editorBrush) editorDrag = 0;
    else editorDrag = state.editorBrush;
    apply(r, c, editorDrag);
  };
  const onEnter = (r, c) => {
    if (editorDrag === null) return;
    if (state.editorGrid[r][c] !== editorDrag) apply(r, c, editorDrag);
  };

  for (let r = 0; r < n; r++) {
    for (let c = 0; c < n; c++) {
      const v = state.editorGrid[r][c];
      const classes = ['editor-cell'];
      if (v) classes.push('filled');
      if ((c + 1) % 5 === 0 && c < n - 1) classes.push('b-right');
      if ((r + 1) % 5 === 0 && r < n - 1) classes.push('b-bottom');
      const cell = $el('div', {
        class: classes.join(' '),
        'data-r': r,
        'data-c': c,
        style: v ? `background:${v};` : '',
        onpointerdown: (e) => onDown(r, c, e),
        onpointerenter: () => onEnter(r, c),
      });
      grid.appendChild(cell);
    }
  }

  // Mobile touch-drag in editor via elementFromPoint
  grid.addEventListener('touchmove', (e) => {
    if (editorDrag === null) return;
    const touch = e.touches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (!el || el.dataset.r === undefined) return;
    onEnter(parseInt(el.dataset.r), parseInt(el.dataset.c));
  }, { passive: true });

  gridWrap.appendChild(grid);
  wrap.appendChild(gridWrap);

  const actions = $el('div', { class: 'controls' },
    $el('button', {
      class: 'btn subtle',
      onclick: () => {
        if (state.editorGrid.flat().some(v => v)) {
          if (confirm('Clear the canvas?')) {
            state.editorGrid = makeEmpty(state.editorSize);
            if (state.editingId) scheduleAutoSave();
            render();
          }
        }
      }
    }, 'Clear'),
    $el('button', {
      class: 'btn',
      onclick: async () => { await flushAutoSave(); testEditorPuzzle(); }
    }, 'Test Play'),
    $el('div', { class: 'save-status' + (saveStatus === 'saved' ? ' done' : (saveStatus === 'saving' ? ' saving' : '')) },
      saveStatus === 'saving' ? $el('span', { class: 'dot-saving' }) : null,
      saveStatus === 'saved' ? $el('span', { class: 'check' }, '✓') : null,
      saveStatus === 'saving' ? 'Saving…'
        : saveStatus === 'saved' ? 'Saved'
        : (state.editingId ? 'Saved' : (state.editorGrid.flat().some(v => v) ? 'Pending…' : 'Auto-saves'))
    ),
    state.editingId ? $el('button', {
      class: 'btn danger',
      onclick: async () => {
        if (confirm('Delete this puzzle?')) {
          clearTimeout(autoSaveTimer); autoSaveTimer = null;
          state.customLevels = state.customLevels.filter(l => l.id !== state.editingId);
          await saveCustomLevels(state.customLevels);
          state.editingId = null;
          saveStatus = 'idle';
          toast('Removed.');
          state.view = 'library';
          render();
        }
      }
    }, 'Delete') : null
  );
  wrap.appendChild(actions);

  return wrap;
}

function testEditorPuzzle() {
  if (!state.editorGrid.flat().some(v => v)) { toast('Draw something first.'); return; }
  state.view = 'play';
  state.parentLevel = null;
  state.currentLevel = {
    id: '__test__',
    name: state.editorName || 'Test Puzzle',
    size: state.editorSize,
    solution: state.editorGrid.map(r => [...r]),
  };
  state.playGrid = makeEmpty(state.editorSize);
  const cols = colorsInPuzzle(state.currentLevel.solution);
  state.playBrush = cols[0] || COLOR.moss;
  state._winShown = false;
  render();
}

// ── render router ─────────────────────────────
function render() {
  app.innerHTML = '';
  app.appendChild(renderBrand());
  if (state.view === 'library')          app.appendChild(renderLibrary());
  else if (state.view === 'play')        app.appendChild(renderPlay());
  else if (state.view === 'editor')      app.appendChild(renderEditor());
  else if (state.view === 'compound')    app.appendChild(renderCompound());
  else if (state.view === 'compound-reveal') app.appendChild(renderCompoundReveal());

  app.appendChild($el('footer', { class: 'footer' },
    $el('span', {}, 'your puzzles save automatically'),
    $el('span', { html: '<span class="kanji-mark">禅</span> made with quietness' })
  ));
}

// ── Android back button ───────────────────────
function handleAndroidBack() {
  // Win overlay open — close it
  const overlay = document.querySelector('.win-overlay');
  if (overlay) { overlay.remove(); state._winShown = false; return; }

  if (state.view === 'play') {
    const level = state.currentLevel;
    if (!level) { state.view = 'library'; render(); return; }
    if (level.id === '__test__') { state.view = 'editor'; state.currentLevel = null; render(); return; }
    if (state.parentLevel) { state.view = 'compound'; state.currentLevel = null; render(); return; }
    state.view = 'library'; state.currentLevel = null; render();
  } else if (state.view === 'editor') {
    flushAutoSave().then(() => { state.view = 'library'; render(); });
  } else if (state.view === 'compound') {
    state.view = 'library'; state.parentLevel = null; render();
  } else if (state.view === 'compound-reveal') {
    state.view = 'compound'; render();
  }
  // library view: do nothing (let Android handle exit)
}

// ── init ──────────────────────────────────────
async function init() {
  app = document.getElementById('app');

  document.addEventListener('contextmenu', (e) => {
    if (e.target.closest('.cell')) e.preventDefault();
  });

  document.addEventListener('pointerup', () => {
    if (dragAction !== null) {
      dragAction = null;
      checkAndShowWin();
    }
    if (editorDrag !== null) {
      editorDrag = null;
    }
  });

  document.addEventListener('pointercancel', () => {
    dragAction = null;
    editorDrag = null;
  });

  // Android hardware back button (Capacitor fires this event)
  document.addEventListener('backbutton', handleAndroidBack, false);

  // Also hook into Capacitor App plugin if available
  if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App) {
    window.Capacitor.Plugins.App.addListener('backButton', handleAndroidBack);
  }

  await loadSettings();
  state.customLevels = await loadCustomLevels();
  state.solved = await loadSolved();
  render();
}

init();
</script>
</body>
</html>
